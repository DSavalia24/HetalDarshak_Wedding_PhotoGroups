<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Group Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background"></div>
  <iframe name="trackerUpdateFrame" id="trackerUpdateFrame" class="hidden-frame" title="tracker update frame"></iframe>

  <main class="container tracker-container">
    <section class="card tracker-page-card">
      <div class="monogram">H ♥ D</div>
      <p class="eyebrow">Coordinator View</p>
      <h1>Photo Tracker</h1>
      <p class="subtitle">Tap the large button when the current group is finished.</p>

      <div id="passcodeBox" class="passcode-box">
        <input type="password" id="passcodeInput" placeholder="Coordinator passcode" />
        <button onclick="unlockTracker()">Unlock Tracker</button>
        <p class="small-note">Default passcode in code: 0711</p>
      </div>

      <div id="trackerApp" class="tracker-app hidden">
        <div id="trackerStatus" class="tracker-status simplified-status"></div>

        <a id="completeCurrentBtn" class="complete-link-button" href="#" target="trackerUpdateFrame" onclick="return completeCurrentGroup();">
          Complete Current Group
        </a>

        <p id="debugMessage" class="debug-message">Ready.</p>

        <details class="jump-panel">
          <summary>⚙ Jump to a different group / admin controls</summary>

          <div class="tracker-actions">
            <button onclick="syncFromSheet()">Sync From Sheet</button>
            <button onclick="resetTrackerConfirm()" class="danger-light">Reset to Group 1</button>
          </div>

          <p class="small-note jump-note">Use this only if a group is skipped or taken out of order.</p>

          <div class="jump-input-row">
            <input type="number" id="jumpGroupInput" min="1" max="44" placeholder="Group #" />
            <button onclick="jumpToGroupFromInput()">Jump</button>
          </div>

          <div id="groupControls" class="group-controls"></div>
        </details>
      </div>
    </section>
  </main>

  <script>
    const TRACKER_URL = "https://script.google.com/macros/s/AKfycbyJenRcbXRDpt6vXL97EHQAdnqeH_9FHTRlCpfqA4nnE0_6Yc1Ur7RFqZI18HbXL1_Gdg/exec";
    const COORDINATOR_PASSCODE = "0711";
    const TOTAL_GROUPS = 44;
    const STORAGE_KEY = "hd_current_photo_group";

    let currentGroup = Number(localStorage.getItem(STORAGE_KEY)) || 1;

    function unlockTracker() {
      const value = document.getElementById("passcodeInput").value;
      if (value === COORDINATOR_PASSCODE) {
        document.getElementById("passcodeBox").classList.add("hidden");
        document.getElementById("trackerApp").classList.remove("hidden");
        renderTracker();
        syncFromSheet();
      } else {
        alert("Incorrect passcode.");
      }
    }

    function setDebug(message) {
      document.getElementById("debugMessage").textContent = message;
    }

    function buildUrl(action, group) {
      let url = TRACKER_URL + "?action=" + encodeURIComponent(action);
      if (group !== undefined && group !== null) url += "&group=" + encodeURIComponent(group);
      url += "&t=" + Date.now();
      return url;
    }

    function saveCurrent(group) {
      currentGroup = Number(group);
      localStorage.setItem(STORAGE_KEY, String(currentGroup));
    }

    function getDoneGroups() {
      const done = [];
      for (let i = 1; i < currentGroup; i++) done.push(i);
      return done;
    }

    function renderTracker() {
      const allDone = currentGroup > TOTAL_GROUPS;
      const nextGroup = allDone ? null : currentGroup + 1 <= TOTAL_GROUPS ? currentGroup + 1 : null;
      const done = getDoneGroups();

      document.getElementById("trackerStatus").innerHTML = `
        <div class="tracker-card current big-current">
          <p class="label">Current Group</p>
          <h2>${allDone ? "All Done" : currentGroup}</h2>
        </div>
        <div class="tracker-card next">
          <p class="label">Next Group</p>
          <h2>${nextGroup ? nextGroup : "None"}</h2>
        </div>
        <div class="tracker-card done-summary">
          <p class="label">Completed</p>
          <p>${done.length ? done.join(", ") : "None yet"}</p>
        </div>
      `;

      const completeBtn = document.getElementById("completeCurrentBtn");
      if (allDone) {
        completeBtn.textContent = "All Groups Complete";
        completeBtn.href = "#";
        completeBtn.classList.add("disabled-link");
      } else {
        completeBtn.textContent = "Complete Group " + currentGroup;
        completeBtn.href = buildUrl("complete", currentGroup);
        completeBtn.classList.remove("disabled-link");
      }

      document.getElementById("groupControls").innerHTML = Array.from({ length: TOTAL_GROUPS }, (_, i) => {
        const group = i + 1;
        let status = "pending";
        if (group < currentGroup) status = "done";
        if (group === currentGroup) status = "current";

        return `
          <a class="group-button ${status}" href="${buildUrl("setCurrent", group)}" target="trackerUpdateFrame" onclick="setCurrentLocally(${group})">
            Group ${group}
            <span>${status === "current" ? "Current" : status === "done" ? "Done" : "Pending"}</span>
          </a>
        `;
      }).join("");
    }

    function completeCurrentGroup() {
      if (currentGroup > TOTAL_GROUPS) return false;
      if (!TRACKER_URL || TRACKER_URL.includes("PASTE_YOUR")) {
        alert("Replace TRACKER_URL in tracker.html first.");
        return false;
      }

      const completed = currentGroup;
      document.getElementById("completeCurrentBtn").href = buildUrl("complete", completed);

      setTimeout(() => {
        saveCurrent(completed + 1);
        renderTracker();
        setDebug("Sent update for Group " + completed + ". Current group is now " + (currentGroup > TOTAL_GROUPS ? "All Done" : currentGroup) + ".");
      }, 700);

      return true;
    }

    function setCurrentLocally(group) {
      saveCurrent(group);
      setTimeout(() => {
        renderTracker();
        setDebug("Set current group to " + group + ".");
      }, 700);
      return true;
    }

    function jumpToGroupFromInput() {
      const value = Number(document.getElementById("jumpGroupInput").value);
      if (!value || value < 1 || value > TOTAL_GROUPS) {
        alert("Enter a group number from 1 to " + TOTAL_GROUPS + ".");
        return;
      }
      if (!confirm("Set Group " + value + " as the current group?")) return;

      document.getElementById("trackerUpdateFrame").src = buildUrl("setCurrent", value);
      saveCurrent(value);
      renderTracker();
      setDebug("Set current group to " + value + ".");
    }

    function resetTrackerConfirm() {
      if (!confirm("Reset tracker so Group 1 is current and all others are pending?")) return;
      document.getElementById("trackerUpdateFrame").src = buildUrl("reset");
      saveCurrent(1);
      renderTracker();
      setDebug("Reset to Group 1.");
    }

    function jsonpRequest(action) {
      return new Promise((resolve, reject) => {
        const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const url = buildUrl(action) + "&callback=" + callbackName;

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("Could not sync from sheet."));
        };

        function cleanup() {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function syncFromSheet() {
      if (!TRACKER_URL || TRACKER_URL.includes("PASTE_YOUR")) {
        setDebug("Replace TRACKER_URL in tracker.html.");
        return;
      }

      try {
        const data = await jsonpRequest("status");
        if (!data.success) {
          setDebug(data.message || "Could not sync from sheet.");
          return;
        }

        const groups = data.groups || [];
        const current = groups.find(g => String(g.status).toLowerCase() === "current");

        if (current) {
          saveCurrent(Number(current.group));
          renderTracker();
          setDebug("Synced from sheet. Current group: " + current.group + ".");
        } else {
          const doneCount = groups.filter(g => String(g.status).toLowerCase() === "done").length;
          saveCurrent(doneCount + 1);
          renderTracker();
          setDebug("Synced from sheet.");
        }
      } catch (error) {
        setDebug("Could not sync from sheet, but local tracker still works.");
        renderTracker();
      }
    }
  </script>
</body>
</html>
